spring:
  application:
    name: java-hexagonal-template

  docker:
    compose:
      file: infra/local/docker-compose.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/hexagonal_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: hexagonal-template-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8082}
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8082}

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:dummy}
        secret-key: ${AWS_SECRET_ACCESS_KEY:dummy}
      dynamodb:
        endpoint: ${DYNAMODB_ENDPOINT:}
      sqs:
        endpoint: ${SQS_ENDPOINT:}
      sns:
        endpoint: ${SNS_ENDPOINT:}

app:
  cache:
    user:
      ttl: ${USER_CACHE_TTL:PT30M}
  kafka:
    topics:
      user-created: user.created
  sqs:
    queues:
      user-events: ${SQS_USER_EVENTS_QUEUE:user-events-queue}
  sns:
    topics:
      user-events: ${SNS_USER_EVENTS_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:user-events-topic}
  clients:
    external-user-service:
      url: ${EXTERNAL_USER_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
